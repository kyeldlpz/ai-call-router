services:
  - type: web
    name: recoverai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: AI_PROVIDER
        sync: false
      - key: OPENROUTER_API_KEYS
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
      - key: OPENROUTER_FALLBACK_MODELS
        sync: false
